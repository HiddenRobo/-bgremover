<!DOCTYPE html>
<html>
<head>
<title>Farooqi Tools - AI Background Remover</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    transition:0.3s;
}

body.dark{
    background:#111;
}

.container{
    background:white;
    padding:30px;
    border-radius:15px;
    width:95%;
    max-width:550px;
    text-align:center;
    box-shadow:0 15px 30px rgba(0,0,0,0.2);
    transition:0.3s;
}

body.dark .container{
    background:#1e1e1e;
    color:white;
}

h2{
    margin-bottom:20px;
}

.drop-zone{
    border:2px dashed #667eea;
    padding:25px;
    border-radius:10px;
    cursor:pointer;
    margin-bottom:15px;
}

.drop-zone.dragover{
    background:#eef2ff;
}

button{
    background:#667eea;
    border:none;
    color:white;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
    margin-top:10px;
}

button:hover{
    background:#5a67d8;
}

.preview-img{
    max-width:100%;
    margin-top:15px;
    border-radius:10px;
}

.loader{
    border:4px solid #f3f3f3;
    border-top:4px solid #667eea;
    border-radius:50%;
    width:40px;
    height:40px;
    animation:spin 1s linear infinite;
    margin:20px auto;
    display:none;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

.compare-container{
    position:relative;
    margin-top:20px;
}

.compare-container img{
    width:100%;
    border-radius:10px;
}

.after-img{
    position:absolute;
    top:0;
    left:0;
    overflow:hidden;
    width:50%;
}

.slider{
    width:100%;
    margin-top:10px;
}

.footer{
    margin-top:20px;
    font-size:13px;
    opacity:0.7;
}

.toggle{
    position:absolute;
    top:20px;
    right:20px;
    cursor:pointer;
    font-size:18px;
}
</style>
</head>

<body>

<div class="toggle" onclick="toggleDark()">🌙</div>

<div class="container">

    <h2>AI Background Remover</h2>

    <div class="drop-zone" id="dropZone">
        Drag & Drop Image Here<br>or Click to Upload
    </div>

    <input type="file" id="fileInput" hidden accept="image/*">

    <img id="preview" class="preview-img" style="display:none;">

    <button onclick="removeBg()">Remove Background</button>

    <div class="loader" id="loader"></div>

    <div id="result"></div>

    <div class="footer">
        Made with ❤️ by <b>Farooqi Tools</b>
    </div>

</div>

<script>
const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");
const preview = document.getElementById("preview");

dropZone.addEventListener("click",()=>fileInput.click());

dropZone.addEventListener("dragover",(e)=>{
    e.preventDefault();
    dropZone.classList.add("dragover");
});

dropZone.addEventListener("dragleave",()=>{
    dropZone.classList.remove("dragover");
});

dropZone.addEventListener("drop",(e)=>{
    e.preventDefault();
    dropZone.classList.remove("dragover");
    fileInput.files = e.dataTransfer.files;
    showPreview();
});

fileInput.addEventListener("change",showPreview);

function showPreview(){
    const file = fileInput.files[0];
    if(file){
        preview.src = URL.createObjectURL(file);
        preview.style.display="block";
    }
}

async function removeBg(){

    const file = fileInput.files[0];

    if(!file){
        alert("Select image first!");
        return;
    }

    document.getElementById("loader").style.display="block";
    document.getElementById("result").innerHTML="";

    const formData = new FormData();
    formData.append("image", file);

    const response = await fetch("/remove-bg", {
        method: "POST",
        body: formData
    });

    document.getElementById("loader").style.display="none";

    if(response.ok){

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);

        document.getElementById("result").innerHTML = `
        <div class="compare-container">
            <img src="${preview.src}">
            <div class="after-img" id="afterImg">
                <img src="${url}">
            </div>
        </div>
        <input type="range" min="0" max="100" value="50" class="slider"
        oninput="document.getElementById('afterImg').style.width=this.value+'%'">
        <br>
        <a href="${url}" download="no-bg.png">
            <button>Download Image</button>
        </a>
        `;
    } else {
        alert("Something went wrong!");
    }
}

function toggleDark(){
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>
